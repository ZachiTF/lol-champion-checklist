<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Track your progress through the League of Legends champion roster. Keep tabs on which champions you've played or mastered."
    />
    <meta name="theme-color" content="#c89b3c" />
    <title>LoL Champion Checklist</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%230b0e14' width='100' height='100'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='%23c89b3c' font-weight='bold' font-family='system-ui'%3E⚔%3C/text%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div id="theme-switcher"></div>

    <header class="page-header">
      <h1>
        League of Legends <span class="highlight">Champion Checklist</span>
      </h1>
      <div class="tab-strip">
        <div id="tabs-bar"></div>
        <button
          id="tab-menu-btn"
          class="tab-menu-btn"
          aria-label="Tab settings"
          aria-haspopup="true"
          aria-expanded="false"
          title="Tab settings"
        >
          ⚙
        </button>
      </div>
      <div id="tab-actions" class="tab-actions-menu" role="menu"></div>
    </header>

    <div class="wip-notice">
      <strong
        >Unfortunately RIOT API does not support challenges like arena
        god.</strong
      >
    </div>

    <div class="challenge-import">
      <div class="region-select-group">
        <select id="server-select"></select>
      </div>
      <input
        type="text"
        id="summoner-search"
        placeholder="Summoner name #EUW"
        autocomplete="off"
      />
      <button id="arena-god-btn">Import Arena God</button>
      <span id="challenge-import-status"></span>
    </div>

    <div class="progress-info">
      <p id="progress">Loading...</p>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <div id="filter-bar" class="filter-bar">
      <div class="search-bar-wrapper">
        <input
          type="text"
          id="filter-search"
          placeholder="Search champions..."
          autocomplete="off"
        />
        <span
          id="filter-search-clear"
          class="search-clear-btn"
          title="Clear search"
          >×</span
        >
      </div>
      <select id="filter-region">
        <option value="" disabled selected>Add Globetrotter Filter</option>
      </select>
      <select id="filter-properties">
        <option value="" disabled selected>Add Harmony Filter</option>
      </select>
      <button id="filter-reset" class="filter-reset">Clear All</button>
    </div>
    <div id="active-filters" class="active-filters"></div>

    <div id="champion-grid"></div>

    <div id="history-box" class="history-box">
      <div class="history-header">
        <h2>Progress History</h2>
        <span id="history-summary" class="history-summary"></span>
      </div>
      <div id="history-chart" class="history-chart"></div>
      <div id="history-axis" class="history-axis"></div>
      <div id="history-recent" class="history-recent"></div>
    </div>

    <script src="data/globetrotter-filters.js"></script>
    <script src="data/harmony-filters.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"
      integrity="sha384-Rv68Y7adOjMMJc1/xFMcdNvXre/HF51to4GZjBALmXr7ABnVl5V4UajJwBu7zbhN"
      crossorigin="anonymous"
    ></script>
    <script src="celebrations.js"></script>
    <script>
      window.APP_CONFIG = window.APP_CONFIG || {};
      (function loadApp() {
        const loadMain = () => {
          const appScript = document.createElement("script");
          appScript.src = "script.js";
          document.body.appendChild(appScript);
        };

        const localConfigScript = document.createElement("script");
        localConfigScript.src = "config.local.js";
        localConfigScript.onload = loadMain;
        localConfigScript.onerror = loadMain;
        document.body.appendChild(localConfigScript);
      })();
    </script>
  </body>
</html>
